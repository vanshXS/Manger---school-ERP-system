# Test Configuration for EnrollmentService Tests

# Database Configuration (H2 for testing)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.com.vansh.manger.Manger.Service.EnrollmentService=DEBUG
logging.level.com.vansh.manger.Manger.Repository=DEBUG
logging.level.org.springframework.test=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Test-specific properties
spring.test.database.replace=none
spring.jpa.defer-datasource-initialization=true

# Security Configuration (relaxed for testing)
spring.security.enabled=false

# Application Configuration
spring.application.name=Manger-Test

# Performance settings for tests
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
